<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0b0d" />
    <meta name="application-name" content="FALSE ACCESS" />
    <meta name="apple-mobile-web-app-title" content="FALSE ACCESS" />
    <meta name="description" content="FALSE ACCESS — сюжетная RPG и практический тренажёр по информационной безопасности." />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
    <title>FALSE ACCESS</title>
    <script>
      (() => {
        const BUILD = '0.4.2';
        const ATTEMPT_KEY = 'false-access-bootstrap-update';
        window.__FALSE_ACCESS_BUILD__ = BUILD;

        async function hardUpdate(version) {
          if (!navigator.onLine) return;
          if (sessionStorage.getItem(ATTEMPT_KEY) === version) return;
          sessionStorage.setItem(ATTEMPT_KEY, version);
          try {
            if ('serviceWorker' in navigator) {
              const registrations = await navigator.serviceWorker.getRegistrations();
              await Promise.all(registrations.map((registration) => registration.unregister()));
            }
            if ('caches' in window) {
              const keys = await caches.keys();
              await Promise.all(keys.filter((key) => key.startsWith('false-access-')).map((key) => caches.delete(key)));
            }
            const url = new URL(window.location.href);
            url.searchParams.set('fa_update', version);
            url.searchParams.set('t', String(Date.now()));
            window.location.replace(url.toString());
          } catch {
            sessionStorage.removeItem(ATTEMPT_KEY);
          }
        }

        async function checkBuild() {
          if (!navigator.onLine) return;
          try {
            const url = new URL('./version.json', window.location.href);
            url.searchParams.set('t', String(Date.now()));
            const response = await fetch(url, { cache: 'no-store' });
            if (!response.ok) return;
            const remote = await response.json();
            if (remote.version && remote.version !== BUILD) await hardUpdate(remote.version);
          } catch {
            // Offline mode keeps the current build running.
          }
        }

        window.addEventListener('online', checkBuild);
        window.addEventListener('pageshow', checkBuild);
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') checkBuild();
        });
        window.setTimeout(checkBuild, 0);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
